      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    odom_topic: odometry  # 里程计话题
    controller_frequency: 20.0  # 控制器主循环频率（Hz）
    min_x_velocity_threshold: 0.001  # X方向速度死区阈值（小于此值视为0）
    min_y_velocity_threshold: 0.5  # Y方向速度死区阈值（小于此值视为0）
    min_theta_velocity_threshold: 0.001  # 角速度死区阈值（小于此值视为0）
    failure_tolerance: 0.3  # 控制失败容忍度
    progress_checker_plugins: ["progress_checker"]  # 进度检查器插件列表
    goal_checker_plugins: ["general_goal_checker"]  # 目标检查器插件列表
    controller_plugins: ["FollowPath"]  # 控制器插件列表
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"  # 插件类型
      required_movement_radius: 0.5  # 最小有效移动半径(米)
      movement_time_allowance: 10.0  # 允许无进展时间(秒)
    general_goal_checker:
      stateful: True  # stateful 参数
      plugin: "nav2_controller::SimpleGoalChecker"  # 插件类型
      xy_goal_tolerance: 0.15  # 到点判定的平面位置容差（米）
      yaw_goal_tolerance: 6.28  # 到点判定的航向角容差（弧度）
    FollowPath:
      plugin: "pb_omni_pid_pursuit_controller::OmniPidPursuitController"  # 插件类型
      translation_kp: 3.0  # 平移控制比例增益 Kp
      translation_ki: 0.1  # 平移控制积分增益 Ki
      translation_kd: 0.3  # 平移控制微分增益 Kd
      enable_rotation: true  # 是否启用旋转控制分支
      rotation_kp: 3.0  # 旋转控制比例增益 Kp
      rotation_ki: 0.1  # 旋转控制积分增益 Ki
      rotation_kd: 0.3  # 旋转控制微分增益 Kd
      transform_tolerance: 0.1  # 控制/行为模块允许的TF时间容差（秒）
      min_max_sum_error: 1.0  # PID误差和限幅，抑制积分累积过大
      lookahead_dist: 2.0  # 纯跟踪前瞻距离（米）
      use_velocity_scaled_lookahead_dist: true  # 是否按当前速度动态缩放前瞻距离
      lookahead_time: 1.0  # 按速度缩放前瞻距离时使用的前瞻时间（秒）
      min_lookahead_dist: 0.5  # 最小前瞻距离（米）
      max_lookahead_dist: 1.0  # 最大前瞻距离（米）
      use_interpolation: false  # 是否对路径点进行插值以平滑跟踪
      use_rotate_to_heading: false  # 是否先原地转向再前进
      use_rotate_to_heading_treshold: 0.1  # 触发先转向模式的角度阈值（弧度）
      min_approach_linear_velocity: 0.5  # 接近目标时允许的最小线速度
      approach_velocity_scaling_dist: 1.0  # 进入该距离后开始线速度缩放减速（米）
      v_linear_min: -2.5  # 线速度下限（m/s）
      v_linear_max: 2.5  # 线速度上限（m/s）
      v_angular_min: -3.0  # 角速度下限（rad/s）
      v_angular_max: 3.0  # 角速度上限（rad/s）
      curvature_min: 0.4                                # 低曲率阈值，低于此值不减速。
      curvature_max: 0.7                                # 高曲率阈值，高于此值大幅减速。
      reduction_ratio_at_high_curvature: 0.5            # 高曲率时的速度降低比例。 0.5 (即减速 50%)
      curvature_forward_dist: 0.7                       # 前向距离，用于曲率计算
      curvature_backward_dist: 0.3                      # 后向距离，用于曲率计算
      max_velocity_scaling_factor_rate: 0.9             # 速度缩放因子的最大变化率


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true  # 是否使用仿真时钟
      update_frequency: 10.0  # 更新频率(Hz)
      publish_frequency: 5.0  # 发布频率(Hz)
      global_frame: odom  # 全局坐标系
      robot_base_frame: gimbal_yaw_fake  # 机器人基坐标系
      rolling_window: true  # 是否使用滚动窗口
      width: 5  # 代价地图宽度(米)
      height: 5  # 代价地图高度(米)
      resolution: 0.05  # 地图分辨率(米/栅格)
      robot_radius: 0.2  # 机器人半径(米)
      plugins: ["static_layer", "intensity_voxel_layer", "inflation_layer"]  # 插件列表
      intensity_voxel_layer:
        plugin: pb_nav2_costmap_2d::IntensityVoxelLayer  # 插件类型
        enabled: true  # enabled 参数
        track_unknown_space: true  # 是否跟踪未知空间
        footprint_clearing_enabled: true  # 是否启用足迹清障
        publish_voxel_map: false  # 是否发布体素地图
        combination_method: 1  # 图层融合方式
        mark_threshold: 0  # 障碍标记阈值
        origin_z: 0.0  # 体素原点Z(米)
        unknown_threshold: 5  # 未知体素阈值
        z_resolution: 0.05  # 体素Z分辨率(米)
        z_voxels: 16  # 体素Z层数
        min_obstacle_height: 0.0  # 最小障碍高度(米)
        max_obstacle_height: 2.0  # 最大障碍高度(米)
        min_obstacle_intensity: 0.1  # 最小障碍强度
        max_obstacle_intensity: 2.0  # 最大障碍强度
        observation_sources: terrain_map  # 障碍观测源列表
        terrain_map:
          data_type: PointCloud2  # 观测数据类型
          # '<robot_namespace>' keyword shall be replaced with 'namespace' where user defined.
          # It doesn't need to start with '/'
          topic: <robot_namespace>/terrain_map  # 话题名称
          sensor_frame: front_mid360  # 传感器坐标系
          min_obstacle_height: 0.0  # 最小障碍高度(米)
          max_obstacle_height: 2.0  # 最大障碍高度(米)
          obstacle_max_range: 5.0  # 障碍最大距离(米)
          obstacle_min_range: 0.2  # 障碍最小距离(米)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"  # 插件类型
        map_subscribe_transient_local: True  # 地图订阅使用瞬态本地QoS
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"  # 插件类型
        cost_scaling_factor: 4.0  # 代价衰减系数
        inflation_radius: 0.7  # 膨胀半径(米)
      always_send_full_costmap: False  # 是否总是发布完整代价地图

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true  # 是否使用仿真时钟
      update_frequency: 5.0  # 更新频率(Hz)
      publish_frequency: 2.0  # 发布频率(Hz)
      global_frame: map  # 全局坐标系
      robot_base_frame: gimbal_yaw_fake  # 机器人基坐标系
      robot_radius: 0.2  # 机器人半径(米)
      resolution: 0.05  # 地图分辨率(米/栅格)
      plugins: ["static_layer", "intensity_voxel_layer", "inflation_layer"]  # 插件列表
      intensity_voxel_layer:
        plugin: pb_nav2_costmap_2d::IntensityVoxelLayer  # 插件类型
        enabled: true  # enabled 参数
        track_unknown_space: true  # 是否跟踪未知空间
        footprint_clearing_enabled: true  # 是否启用足迹清障
        publish_voxel_map: false  # 是否发布体素地图
        combination_method: 1  # 图层融合方式
        mark_threshold: 0  # 障碍标记阈值
        origin_z: 0.0  # 体素原点Z(米)
        unknown_threshold: 5  # 未知体素阈值
        z_resolution: 0.05  # 体素Z分辨率(米)
        z_voxels: 16  # 体素Z层数
        min_obstacle_height: 0.0  # 最小障碍高度(米)
        max_obstacle_height: 2.0  # 最大障碍高度(米)
        min_obstacle_intensity: 0.1  # 最小障碍强度
        max_obstacle_intensity: 2.0  # 最大障碍强度
        observation_sources: terrain_map_ext  # 障碍观测源列表
        terrain_map_ext:
          data_type: PointCloud2  # 观测数据类型
          # '<robot_namespace>' keyword shall be replaced with 'namespace' where user defined.
          # It doesn't need to start with '/'
          topic: <robot_namespace>/terrain_map_ext  # 话题名称
          sensor_frame: front_mid360  # 传感器坐标系
          min_obstacle_height: 0.0  # 最小障碍高度(米)
          max_obstacle_height: 2.0  # 最大障碍高度(米)
          obstacle_max_range: 10.0  # 障碍最大距离(米)
          obstacle_min_range: 0.2  # 障碍最小距离(米)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"  # 插件类型
        map_subscribe_transient_local: True  # 地图订阅使用瞬态本地QoS
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"  # 插件类型
        cost_scaling_factor: 4.0  # 代价衰减系数
        inflation_radius: 0.7  # 膨胀半径(米)
      always_send_full_costmap: False  # 是否总是发布完整代价地图

# The yaml_filename does not need to be specified since it going to be set by defaults in launch.
# If you'd rather set it in the yaml, remove the default "map" value in the tb3_simulation_launch.py
# file & provide full path to map below. If CLI map configuration or launch default is provided, that will be used.
map_server:
  ros__parameters:
    yaml_filename: ""  # 地图YAML文件路径

map_saver:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    save_map_timeout: 5.0  # 存图服务超时(秒)
    free_thresh_default: 0.25  # 空闲阈值默认值
    occupied_thresh_default: 0.65  # 占用阈值默认值
    map_subscribe_transient_local: True  # 地图订阅使用瞬态本地QoS

planner_server:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    expected_planner_frequency: 10.0  # 期望全局规划更新频率（Hz）
    planner_plugins: ["GridBased"]  # 启用的全局规划器插件列表
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"  # 插件类型
      tolerance: 0.5  # 终点不可精确到达时允许的规划容差（米）
      allow_unknown: true  # 是否允许路径穿越未知区域
      downsample_costmap: false  # 是否对代价地图下采样后再规划
      downsampling_factor: 1  # 代价地图下采样倍数
      max_iterations: 1000000  # 平滑/规划阶段的最大迭代次数
      max_on_approach_iterations: 1000  # 接近终点阶段的最大附加迭代次数
      max_planning_time: 3.5  # 单次规划可用最大时间（秒）
      cost_travel_multiplier: 2.0  # 路径代价权重，越大越倾向远离高代价区
      motion_model_for_search: "DUBIN"  # 搜索运动学模型（DUBIN/REEDS_SHEPP）
      angle_quantization_bins: 64  # 角度离散桶数量（混合A*角度分辨率）
      analytic_expansion_ratio: 3.5  # 解析扩展触发比例（越大越频繁尝试直达）
      analytic_expansion_max_length: 3.0  # 解析扩展允许的最大长度（米）
      minimum_turning_radius: 0.05  # 运动模型最小转弯半径（米）
      retrospective_penalty: 0.025  # 回顾惩罚，鼓励后段机动以提升搜索效率
      reverse_penalty: 1.0  # 倒车惩罚系数（仅可倒车模型生效）
      change_penalty: 0.0  # 换向惩罚系数（前进/后退切换代价）
      non_straight_penalty: 1.20  # 非直行惩罚系数（鼓励更直路径）
      cost_penalty: 2.0  # 高代价区域惩罚系数（鼓励走通道中心）
      rotation_penalty: 5.0  # 原地旋转惩罚系数（抑制频繁原地转向）
      lookup_table_size: 20.0  # Dubins/Reeds-Shepp查表窗口大小（米）
      cache_obstacle_heuristic: True  # 是否缓存障碍启发式以加速重复重规划
      allow_reverse_expansion: False  # 是否允许反向扩展搜索分支
      smooth_path: True  # 规划后是否进行路径平滑
      smoother:
        max_iterations: 1000  # 平滑/规划阶段的最大迭代次数
        w_smooth: 0.3  # 路径平滑项权重（越大越平滑）
        w_data: 0.2  # 原始路径保持项权重（越大越贴近原路径）
        tolerance: 1.0e-10  # 终点不可精确到达时允许的规划容差（米）
        do_refinement: true  # 是否执行二次细化平滑

smoother_server:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    smoother_plugins: ["simple_smoother"]  # 平滑器插件列表
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"  # 插件类型
      tolerance: 1.0e-10  # 终点不可精确到达时允许的规划容差（米）
      max_its: 1000  # 平滑器最大迭代次数
      do_refinement: True  # 是否执行二次细化平滑

behavior_server:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    local_costmap_topic: local_costmap/costmap_raw  # 局部代价地图话题
    global_costmap_topic: global_costmap/costmap_raw  # 全局代价地图话题
    local_footprint_topic: local_costmap/published_footprint  # 局部足迹话题
    global_footprint_topic: global_costmap/published_footprint  # 全局足迹话题
    cycle_frequency: 10.0  # 行为循环频率(Hz)
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]  # 行为插件列表
    spin:
      plugin: "nav2_behaviors/Spin"  # 插件类型
    backup:
      plugin: "pb_nav2_behaviors/BackUpFreeSpace"  # 插件类型
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"  # 插件类型
    wait:
      plugin: "nav2_behaviors/Wait"  # 插件类型
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"  # 插件类型
    local_frame: odom  # 局部坐标系
    global_frame: map  # 全局坐标系
    robot_base_frame: gimbal_yaw_fake  # 机器人基坐标系
    transform_tolerance: 0.1  # 控制/行为模块允许的TF时间容差（秒）
    simulate_ahead_time: 2.0  # 行为仿真前视时长（秒）
    max_rotational_vel: 1.0  # 行为树动作允许的最大旋转速度（rad/s）
    min_rotational_vel: 0.4  # 行为树动作允许的最小旋转速度（rad/s）
    rotational_acc_lim: 3.2  # 行为树动作旋转加速度上限（rad/s^2）
    # params for pb_nav2_behaviors/BackUpFreeSpace
    service_name: "global_costmap/get_costmap"  # 服务名称
    max_radius: 2.0  # 最大搜索半径(米)
    visualize: false  # 是否可视化

waypoint_follower:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    loop_rate: 20  # 航点循环频率(Hz)
    stop_on_failure: false  # 失败时是否停止
    waypoint_task_executor_plugin: "wait_at_waypoint"  # 航点任务执行插件
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"  # 插件类型
      enabled: True  # enabled 参数
      waypoint_pause_duration: 200  # 航点停留时长(ms)

velocity_smoother:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    smoothing_frequency: 20.0  # 速度平滑器输出频率（Hz）
    scale_velocities: False  # 是否在超限时按比例整体缩放速度分量
    feedback: "OPEN_LOOP"  # 平滑反馈模式（OPEN_LOOP/CLOSED_LOOP）
    max_velocity: [2.5, 2.5, 3.0]  # 最大速度限制 [vx, vy, wz]
    min_velocity: [-2.5, -2.5, -3.0]  # 最小速度限制 [vx, vy, wz]
    max_accel: [4.5, 4.5, 5.0]  # 最大加速度限制 [ax, ay, aw]
    max_decel: [-4.5, -4.5, -5.0]  # 最大减速度限制 [ax, ay, aw]
    odom_topic: "odometry"  # 里程计话题
    odom_duration: 0.1  # odom_duration 参数
    deadband_velocity: [0.0, 0.0, 0.0]  # 速度死区 [vx, vy, wz]，小于该值输出为0
    velocity_timeout: 1.0  # 超过该时长未收到速度命令则输出置零（秒）

pb_teleop_twist_joy_node:
  ros__parameters:
    use_sim_time: true  # 是否使用仿真时钟
    robot_base_frame: gimbal_yaw  # 机器人基坐标系
    control_mode: auto_control  # Option: auto_control, manual_control；中文：控制模式

    require_enable_button: true  # 是否需要使能按键
    enable_button: 4  # L1 shoulder button；中文：使能按键编号
    enable_turbo_button: 5  # R1 shoulder button；中文：加速按键编号

    axis_chassis:
      x: 1  # Left thumb stick vertical；中文：X轴映射/缩放参数
      y: 0  # Left thumb stick horizontal；中文：Y轴映射/缩放参数
      yaw: 6  # button_left and button_right；中文：偏航映射/缩放参数
    scale_chassis:
      x: 2.5  # X轴映射/缩放参数
      y: 2.5  # Y轴映射/缩放参数
      yaw: 3.0  # 偏航映射/缩放参数
    scale_chassis_turbo:
      x: 4.0  # X轴映射/缩放参数
      y: 4.0  # Y轴映射/缩放参数
      yaw: 6.0  # 偏航映射/缩放参数

    axis_gimbal:
      roll: -1  # Disable；中文：横滚映射/缩放参数
      pitch: 4  # Right thumb stick vertical；中文：俯仰映射/缩放参数
      yaw: 3  # Right thumb stick horizontal；中文：偏航映射/缩放参数
    scale_gimbal:
      roll: 0.0  # 横滚映射/缩放参数
      pitch: -1.0  # 俯仰映射/缩放参数
      yaw: 2.5  # 偏航映射/缩放参数
    scale_gimbal_turbo:
      roll: 0.0  # 横滚映射/缩放参数
      pitch: -1.5  # 俯仰映射/缩放参数
      yaw: 3.5  # 偏航映射/缩放参数
